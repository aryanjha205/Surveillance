<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CrowdEye - High Definition Crowd Monitor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#00c3ff">
    <link rel="icon" type="image/png" href="https://img.icons8.com/isometric/512/visible.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00c3ff;
            --accent: #ff0055;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, hsla(199, 100%, 50%, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(334, 100%, 50%, 0.1) 0px, transparent 50%);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .navbar {
            width: 100%;
            padding: 1.5rem 0;
            text-align: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 2rem;
        }

        h1 {
            font-weight: 800;
            margin: 0;
            font-size: 2rem;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #00c3ff, #ff0055);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.875rem;
            font-weight: 600;
            background: rgba(0, 195, 255, 0.1);
            color: var(--primary);
            margin-bottom: 1.5rem;
            border: 1px solid rgba(0, 195, 255, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.5; }
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            margin-bottom: 1.5rem;
        }

        .video-wrapper img, .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.2);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .stat-label {
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .alert-active {
            color: var(--accent);
            animation: alert-flash 1s infinite alternate;
        }

        @keyframes alert-flash {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.875rem;
            color: #64748b;
            text-align: center;
            padding-bottom: 2rem;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        /* Loading Overlay */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 195, 255, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #error-msg {
            color: var(--accent);
            font-weight: bold;
            margin-top: 1rem;
            display: none;
        }

        /* Mobile specific adjustments */
        @media (max-width: 640px) {
            .container {
                width: 95%;
                padding: 1rem;
            }
            h1 { font-size: 1.5rem; }
            .stat-value { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>

    <nav class="navbar">
        <h1>CROWDEYE</h1>
    </nav>

    <div class="container">
        <div class="status-badge">
            <div class="status-dot"></div>
            SYSTEM ONLINE
        </div>

        <div class="video-wrapper">
            <!-- Source will be switched based on environment -->
            <img id="stream" src="/video" alt="Feed Initializing..." onerror="this.style.display='none'; document.getElementById('webcam').style.display='block'; startWebcam();">
            <video id="webcam" autoplay playsinline muted style="display:none;"></video>
            <canvas id="canvas" style="display:none;"></canvas>
        </div>

        <div id="error-msg">⚠️ Camera access denied or Feed unavailable</div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Live Count</div>
                <div class="stat-value" id="count-val">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Security Alert</div>
                <div class="stat-value" id="alert-status">NORMAL</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">System Load</div>
                <div class="stat-value" id="load-val">LOW</div>
            </div>
        </div>
    </div>

    <footer class="footer">
        Powered by AI Vision &mdash; Secured by <a href="https://t.me/CrowdEye_bot">@CrowdEye_bot</a>
    </footer>

    <script>
        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/sw.js').then(reg => {
                    console.log('SW Registered');
                });
            });
        }

        const loader = document.getElementById('loader');
        window.onload = () => {
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 800);
        };

        const streamImg = document.getElementById('stream');
        const countVal = document.getElementById('count-val');
        const alertStatus = document.getElementById('alert-status');
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const errorMsg = document.getElementById('error-msg');

        // Automatic Environment Detection
        // If /video fails (not running locally), use client-side fetch for Vercel
        function startWebcam() {
            console.log("Starting client-side PWA mode...");
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(s => {
                    video.srcObject = s;
                    setInterval(captureAndProcess, 2000); // Process every 2 seconds
                })
                .catch(err => {
                    console.error("Camera fail:", err);
                    errorMsg.style.display = 'block';
                });
        }

        async function captureAndProcess() {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('file', blob, 'frame.jpg');

                try {
                    const response = await fetch('/detect', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    updateUI(data.count);
                } catch (err) {
                    console.error("Detection API error:", err);
                }
            }, 'image/jpeg', 0.8);
        }

        function updateUI(count) {
            countVal.innerText = count || 0;
            if (count > 2) { // Match backend CROWD_LIMIT
                alertStatus.innerText = "CRITICAL";
                alertStatus.classList.add("alert-active");
            } else {
                alertStatus.innerText = "NORMAL";
                alertStatus.classList.remove("alert-active");
            }
        }

        // Local Python Stream Poll (if img is showing)
        setInterval(() => {
            if (streamImg.style.display !== 'none') {
                 // Try to fetch stats if they were provided via another endpoint
                 // For now, we'll assume the local script overlay works
                 // But in a real app, you'd have a /stats endpoint
            }
        }, 1000);
    </script>
</body>
</html>
